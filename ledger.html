document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-decoration: none; }\na:hover { text-decoration: underline; }\n\n/* ---- App shell ---- */\n.ds-shell {\n  display: grid;\n  grid-template-columns: 260px 1fr;\n  min-height: 100vh;\n}\n\n.ds-sidebar {\n  background: var(--white);\n  border-right: 1px solid var(--border-subtle);\n  padding: 28px 20px;\n  position: sticky;\n  top: 0;\n  height: 100vh;\n  overflow-y: auto;\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n}\n\n.ds-brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 4px 6px;\n}\n.ds-brand-mark { width: 32px; height: 32px; }\n.ds-brand-text {\n  font: var(--fw-black) 16px/1.1 var(--font-sans);\n  color: var(--brand-primary);\n  letter-spacing: 0.02em;\n}\n.ds-brand-sub {\n  font: var(--fw-regular) 11px/1 var(--font-sans);\n  color: var(--text-tertiary);\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  margin-top: 2px;\n}\n\n.ds-nav { display: flex; flex-direction: column; gap: 4px; }\n.ds-nav-group-title {\n  font: var(--fw-bold) 11px/1 var(--font-sans);\n  color: var(--text-muted);\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  padding: 12px 10px 6px;\n}\n.ds-nav a {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 9px 10px;\n  border-radius: var(--radius-md);\n  color: var(--text-secondary);\n  font: var(--fw-bold) 14px/1 var(--font-sans);\n  text-decoration: none;\n  position: relative;\n}\n.ds-nav a:hover { background: var(--neutral-5); color: var(--text-primary); }\n.ds-nav a.active {\n  background: var(--primary-5);\n  color: var(--brand-primary);\n}\n.ds-nav a.active::before {\n  content: \"\";\n  position: absolute;\n  left: -20px;\n  top: 8px;\n  bottom: 8px;\n  width: 3px;\n  background: var(--brand-primary);\n  border-radius: 0 2px 2px 0;\n}\n.ds-nav-dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: var(--neutral-20);\n}\n.ds-nav a.active .ds-nav-dot { background: var(--brand-accent); }\n\n.ds-sidebar-footer {\n  margin-top: auto;\n  padding-top: 16 alue { color: var(--red-110); }\n\n  /* ── Card / panel ──────────────────────────────────── */\n  .panel { background: var(--white); border: 1px solid var(--border-subtle);\n           border-radius: var(--radius-md); margin-bottom: 16px; overflow: hidden;\n           box-shadow: var(--shadow-xs); }\n  .panel-hd { display: flex; align-items: center; justify-content: space-between;\n              padding: 14px 20px; border-bottom: 1px solid var(--border-subtle); gap: 12px; }\n  .panel-title { font: 700 15px/1.2 var(--font-sans); color: var(--text-primary); margin: 0;\n                 display: flex; align-items: center; gap: 10px; }\n  .panel-actions { display: flex; gap: 8px; flex-wrap: wrap; }\n  .panel-body { padding: 16px 20px 20px; }\n  .panel-body.flush { padding: 0; }\n\n  /* ── Spaced-row table (Constrafor cf-table pattern) ── */\n  .ct-wrap { padding: 6px 16px 16px; overflow-x: auto; }\n  .ct { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 100%; }\n  .ct thead th { font: 900 11px/1.36 var(--font-sans); color: var(--text-muted);\n                 text-align: left; padding: 8px 14px; letter-spacing: 0.06em;\n                 text-transform: uppercase; white-space: nowrap; vertical-align: bottom; }\n  .ct tbody tr { background: var(--white); box-shadow: var(--shadow-md);\n                 border-radius: var(--radius-md); transition: transform 0.1s, box-shadow 0.15s; }\n  .ct tbody tr.clickable { cursor: pointer; }\n  .ct tbody tr.clickable:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(16,24,40,0.10); }\n  .ct tbody td { padding: 14px; font: 400 13px/1.4 var(--font-sans);\n                 color: var(--text-primary); vertical-align: middle; white-space: nowrap; }\n  .ct tbody td:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); padding-left: 16px; }\n  .ct tbody td:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; padding-right: 16px; }\n  .ct tbody tr.total td { background: var(--primary-5); color: var(--brand-primary); font-weight: 700; box-shadow: none; }\n  .ct tbody tr.subhd td { background: transparent; box-shadow: none; padding: 8px 14px;\n                          font: 700 11px/1 var(--font-sans); color: var(--brand-primary);\n                          text-transform: uppercase; letter-spacing: 0.1em; }\n  .ct tbody tr.flagged td { background: linear-gradient(90deg, var(--yellow-5), var(--white) 30%); }\n  .ct tbody tr.danger-row td { background: linear-gradient(90deg, var(--red-5), var(--white) 30%); }\n\n  /* mono numbers */\n  .num { font-variant-numeric: tabular-nums; text-align: right; }\n\n  /* ── Pills (alias to ds shell.css pill-* with extra colors) ── */\n  .pill-arctic { background: var(--arctic-10); color: var(--arctic-140); border-color: var(--arctic-20); }\n  .pill-purple { background: var(--purple-10); color: var(--purple-120); border-color: rgba(131,56,236,0.2); }\n  .pill-orange { background: var(--orange-10); color: var(--orange-120); border-color: rgba(236,74,10,0.18); }\n  .pill-pink   { background: var(--pink-10); color: var(--pink-120); border-color: rgba(193,21,116,0.18); }\n\n  /* ── Buttons sized for tables ── */\n  .btn-xs { font-size: 12px; padding: 5px 10px; border-radius: var(--radius-sm); line-height: 1; }\n  .btn-outline { background: var(--white); color: var(--text-secondary); border-color: var(--border-default); }\n  .btn-outline:hover { background: var(--neutral-5); color: var(--text-primary); }\n  .btn-success { background: var(--green-100); color: var(--white); border-color: var(--green-120); }\n  .btn-success:hover { background: var(--green-120); }\n  .btn-tertiary { background: var(--primary-5); color: var(--brand-primary); border-color: var(--primary-10); }\n  .btn-tertiary:hover { background: var(--primary-10); }\n\n  /* ── Alert banners ──────────────────────────────────── */\n  .alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px;\n           border-radius: var(--rad
